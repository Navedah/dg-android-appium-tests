name: DG Android - Kotlin Tests on LambdaTest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-tests:
    name: Run Kotlin Suite on LambdaTest (Galaxy S25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run Kotlin test suite on LambdaTest
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          mvn test -Dsuite=dg-android-kotlin.xml \
            -DappUrl=${{ secrets.LT_APP_URL }} \
            -DloginEmail=${{ secrets.DG_EMAIL }} \
            -DloginPassword=${{ secrets.DG_PASSWORD }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
